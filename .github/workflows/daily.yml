name: Repository 2 - Dynamic Docker Cycle (09:30 PM IST)
on:
  schedule:
    # 16:00 UTC = 21:30 IST
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: daily-docker-2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x script.sh

      - name: Matrix DB Bootstrapper (Fetch Dynamic Environment)
        id: bootstrapper
        env:
          FARM_API_TOKEN: ${{ secrets.FARM_API_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
          MATRIX_DB_HOST: ${{ secrets.MATRIX_DB_HOST }}
        run: |
          echo "Contacting Matrix DB for Pod Environment..."
          curl -s -H "Authorization: Bearer $FARM_API_TOKEN" "$MATRIX_DB_HOST/api/farm/runner-env?group=$GROUP_ID" > runner_env.json

          # Inject all variables directly into the runner memory!
          echo "ACCOUNT_1=$(jq -r .account_1 runner_env.json)" >> $GITHUB_ENV
          echo "ACCOUNT_2=$(jq -r .account_2 runner_env.json)" >> $GITHUB_ENV
          echo "ACCOUNT_3=$(jq -r .account_3 runner_env.json)" >> $GITHUB_ENV

          echo "SESSION_RESTORE_URL_ONE=$(jq -r .restore_url_1 runner_env.json)" >> $GITHUB_ENV
          echo "SESSION_RESTORE_URL_TWO=$(jq -r .restore_url_2 runner_env.json)" >> $GITHUB_ENV
          echo "SESSION_RESTORE_URL_THREE=$(jq -r .restore_url_3 runner_env.json)" >> $GITHUB_ENV

          echo "DISCORD_WEBHOOK_URL=$(jq -r .discord_webhook_url runner_env.json)" >> $GITHUB_ENV
          echo "COLLECTOR_URL=$(jq -r .collector_url runner_env.json)" >> $GITHUB_ENV
          echo "COLLECTOR_TOKEN=$(jq -r .collector_token runner_env.json)" >> $GITHUB_ENV
          echo "HMAC_SECRET=$(jq -r .hmac_secret runner_env.json)" >> $GITHUB_ENV

          echo "Successfully injected secrets from Matrix DB without GitHub Repository Secrets!"

      - name: Calculate Daily Active Pod (Repo 2 Offset)
        id: calculate
        env:
          GROUP_ID: ${{ secrets.GROUP_ID }}
          MATRIX_DB_HOST: ${{ secrets.MATRIX_DB_HOST }}
        run: |
          echo "JOB_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "IP=$(curl -s https://api.ipify.org)" >> $GITHUB_ENV

          # Dynamic rotation logic exactly like legacy (Repo 2 Starts on Slot 2)
          DAY_NUM=$(date +%j | sed 's/^0*//')
          INDEX=$(( (DAY_NUM - 1) % 3 ))

          if [ "$INDEX" -eq 0 ]; then
             echo "Using sequence=two -> Account 2"
             echo "ACTIVE_ACCOUNT=$ACCOUNT_2" >> $GITHUB_ENV
             echo "ACCOUNT_NAME=Account 2" >> $GITHUB_ENV
             echo "TARGET_SCRIPT_URL=$MATRIX_DB_HOST/api/farm/payload?group=$GROUP_ID&sequence=two" >> $GITHUB_ENV
             echo "TARGET_RESTORE_URL=$SESSION_RESTORE_URL_TWO" >> $GITHUB_ENV
          elif [ "$INDEX" -eq 1 ]; then
             echo "Using sequence=three -> Account 3"
             echo "ACTIVE_ACCOUNT=$ACCOUNT_3" >> $GITHUB_ENV
             echo "ACCOUNT_NAME=Account 3" >> $GITHUB_ENV
             echo "TARGET_SCRIPT_URL=$MATRIX_DB_HOST/api/farm/payload?group=$GROUP_ID&sequence=three" >> $GITHUB_ENV
             echo "TARGET_RESTORE_URL=$SESSION_RESTORE_URL_THREE" >> $GITHUB_ENV
          else
             echo "Using sequence=one -> Account 1"
             echo "ACTIVE_ACCOUNT=$ACCOUNT_1" >> $GITHUB_ENV
             echo "ACCOUNT_NAME=Account 1" >> $GITHUB_ENV
             echo "TARGET_SCRIPT_URL=$MATRIX_DB_HOST/api/farm/payload?group=$GROUP_ID&sequence=one" >> $GITHUB_ENV
             echo "TARGET_RESTORE_URL=$SESSION_RESTORE_URL_ONE" >> $GITHUB_ENV
          fi

      - name: Send IP to collector (Ingest)
        continue-on-error: true
        env:
          COLLECTOR_URL: ${{ env.COLLECTOR_URL }}
          COLLECTOR_TOKEN: ${{ env.COLLECTOR_TOKEN }}
          HMAC_SECRET: ${{ env.HMAC_SECRET }}
        run: |
          if [ -z "$COLLECTOR_URL" ] || [ "$COLLECTOR_URL" == "null" ] || [ "$COLLECTOR_URL" == "" ]; then
             echo "No Collector URL provided. Skipping."
             exit 0
          fi

          ACC="${ACTIVE_ACCOUNT:-${{ github.repository_owner }}}"
          ACC_LABEL="${ACCOUNT_NAME:-${{ github.repository_owner }}}"

          payload=$(jq -n \
            --arg account  "$ACC" \
            --arg label    "$ACC_LABEL" \
            --arg repo     "${{ github.repository }}" \
            --arg run_id   "${{ github.run_id }}" \
            --arg job      "${{ github.job }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg ip       "${IP:-unknown}" \
            --arg ts       "${JOB_START}" \
            '{account:$account,account_label:$label,repo:$repo,run_id:$run_id,job:$job,workflow:$workflow,ip:$ip,ts:$ts}')

          sig=$(printf "%s" "$payload" | openssl dgst -sha256 -hmac "$HMAC_SECRET" -binary | base64)

          curl -s -X POST "$COLLECTOR_URL/ingest" \
            -H "Authorization: Bearer $COLLECTOR_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Signature: $sig" \
            -d "$payload" || true

      - name: Ask collector if we should run (Gate)
        id: gate
        continue-on-error: true
        env:
          COLLECTOR_URL: ${{ env.COLLECTOR_URL }}
          COLLECTOR_TOKEN: ${{ env.COLLECTOR_TOKEN }}
          HMAC_SECRET: ${{ env.HMAC_SECRET }}
        run: |
          if [ -z "$COLLECTOR_URL" ] || [ "$COLLECTOR_URL" == "null" ] || [ "$COLLECTOR_URL" == "" ]; then
             echo "No Collector URL provided. Defaulting to SHOULD_RUN=true."
             echo "SHOULD_RUN=true" >> $GITHUB_ENV
             exit 0
          fi

          ACC="${ACTIVE_ACCOUNT:-${{ github.repository_owner }}}"
          ACC_LABEL="${ACCOUNT_NAME:-${{ github.repository_owner }}}"

          gate_payload=$(jq -n \
            --arg account  "$ACC" \
            --arg label    "$ACC_LABEL" \
            --arg repo     "${{ github.repository }}" \
            --arg run_id   "${{ github.run_id }}" \
            --arg job      "${{ github.job }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg ip       "${IP:-unknown}" \
            --arg ts       "${JOB_START}" \
            '{account:$account,account_label:$label,repo:$repo,run_id:$run_id,job:$job,workflow:$workflow,ip:$ip,ts:$ts}')

          gate_sig=$(printf "%s" "$gate_payload" | openssl dgst -sha256 -hmac "$HMAC_SECRET" -binary | base64)

          resp=$(curl -s -X POST "$COLLECTOR_URL/gate" \
            -H "Authorization: Bearer $COLLECTOR_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Signature: $gate_sig" \
            -d "$gate_payload" || echo '{}')

          should_run=$(echo "$resp" | jq -r '.should_run // "true"')
          reason=$(echo "$resp" | jq -r '.reason // ""')

          echo "SHOULD_RUN=$should_run" >> $GITHUB_ENV
          echo "GATE_REASON=$reason" >> $GITHUB_ENV

      - name: Abort early (Policy Check)
        if: env.SHOULD_RUN != 'true'
        run: |
          echo "Policy triggered: ${{ env.GATE_REASON }}. Skipping project run." >> $GITHUB_STEP_SUMMARY
          exit 0

      - name: Run cyclic Dynamic Dispatcher script
        if: env.SHOULD_RUN == 'true'
        env:
          FARM_API_TOKEN: ${{ secrets.FARM_API_TOKEN }}
          PROJECT_NAME: '007-of-two'
          SESSION_COPY_DELAY: 5700 # Wait 95 minutes before copying sessions
          ENABLE_SESSION_UPLOAD: 'true' # Set to 'false' to disable artifact upload
          ENABLE_ARTIFACT_UPLOAD: 'true' # Upload as Build Artifact
          ENABLE_RELEASE_UPLOAD: 'false' # Upload to GitHub Release
          ENABLE_SESSION_RESTORE: 'false' # Set to 'true' to enable session restore (and disable upload)
        run: ./script.sh

      - name: Upload Sessions Artifact
        if: env.SHOULD_RUN == 'true' && env.ARTIFACT_CREATED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: sessions.zip
          retention-days: 5
